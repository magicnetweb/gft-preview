<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GFT Filtrazione — Mobile Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@500;600;700;800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">

  <template id="__bundler_thumbnail" data-bg-color="#0a2540">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#0a2540"/>
      <rect x="470" y="300" width="260" height="200" rx="34" fill="#ffffff"/>
      <rect x="470" y="300" width="34" height="200" fill="#f5b301"/>
      <text x="612" y="432" font-family="Arial,sans-serif" font-weight="800" font-size="120" letter-spacing="4" text-anchor="middle" fill="#0a2540">GF<tspan fill="#d99e00">T</tspan></text>
    </svg>
  </template>

  <style>
    :root {
      --navy: #0a2540;
      --navy-deep: #06192c;
      --navy-soft: #12365a;
      --gold: #f5b301;
      --gold-deep: #d99e00;
      --steel: #5b7186;
      --mist: #eef2f6;
      --line: #e2e8ef;
      --ink: #0a2540;
      --ink-soft: #51637a;
      --white: #ffffff;
      --ce-green: #1f8a4c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Barlow', -apple-system, sans-serif;
      background:
        radial-gradient(1200px 600px at 20% 0%, #1a3a5c 0%, transparent 60%),
        radial-gradient(900px 500px at 100% 100%, #0c2d4a 0%, transparent 55%),
        #0a1622;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 28px;
      -webkit-font-smoothing: antialiased;
    }

    .phone {
      position: relative;
      width: 390px;
      height: 844px;
      background: #000;
      border-radius: 54px;
      padding: 11px;
      box-shadow:
        0 0 0 2px #1c1c1e,
        0 40px 90px rgba(0,0,0,0.55),
        0 10px 30px rgba(0,0,0,0.4);
    }

    .screen-frame {
      position: relative;
      width: 100%;
      height: 100%;
      background: var(--mist);
      border-radius: 44px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Dynamic island */
    .island {
      position: absolute;
      top: 11px;
      left: 50%;
      transform: translateX(-50%);
      width: 122px;
      height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 100;
    }

    /* Status bar */
    .status-bar {
      height: 54px;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 30px 6px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Barlow Semi Condensed';
      letter-spacing: 0.3px;
      z-index: 50;
    }
    .status-bar.on-dark { color: #fff; }
    .status-bar.on-light { color: var(--ink); }
    .status-icons { display: flex; align-items: center; gap: 6px; }
    .status-icons svg { display: block; }

    .scroll-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }
    .scroll-area::-webkit-scrollbar { width: 0; }

    .screen { display: none; flex-direction: column; min-height: 100%; }
    .screen.active { display: flex; }

    /* ============ HOME ============ */
    .home-top {
      background:
        linear-gradient(160deg, var(--navy) 0%, var(--navy-deep) 100%);
      padding: 0 22px 26px;
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .home-top::after {
      content: "";
      position: absolute;
      right: -60px; top: -40px;
      width: 220px; height: 220px;
      border-radius: 50%;
      border: 1.5px solid rgba(245,179,1,0.18);
      box-shadow: 0 0 0 26px rgba(245,179,1,0.05);
    }
    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 4px;
      position: relative; z-index: 2;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
    }
    .brand-logo {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 6px 16px rgba(0,0,0,0.28);
      overflow: hidden;
    }
    .brand-logo img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .brand-mark {
      font-family: 'Barlow Semi Condensed';
      font-weight: 800;
      font-size: 24px;
      letter-spacing: 0.8px;
      color: #fff;
      line-height: 1;
    }
    .brand-mark .accent { color: var(--gold); }
    .brand-sub {
      font-size: 9.5px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.55);
      font-weight: 600;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .header-actions { display: flex; align-items: center; gap: 9px; }
    .phone-btn {
      display: flex; align-items: center; gap: 7px;
      background: var(--gold);
      color: var(--navy-deep);
      font-family: 'Barlow Semi Condensed';
      font-weight: 700; font-size: 14px; letter-spacing: 0.3px;
      padding: 9px 13px; border-radius: 12px;
      cursor: pointer; border: none;
      box-shadow: 0 6px 16px rgba(245,179,1,0.28);
      transition: transform 0.14s;
    }
    .phone-btn:active { transform: scale(0.95); }
    .icon-btn {
      width: 40px; height: 40px;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: #fff;
      transition: background 0.18s;
    }
    .icon-btn:active { background: rgba(255,255,255,0.2); }

    .hero {
      position: relative; z-index: 2;
      margin-top: 26px;
    }
    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-family: 'Barlow Semi Condensed';
      font-size: 11px;
      letter-spacing: 1.5px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--gold);
      background: rgba(245,179,1,0.1);
      border: 1px solid rgba(245,179,1,0.25);
      padding: 5px 11px;
      border-radius: 20px;
    }
    .hero h1 {
      font-family: 'Barlow Semi Condensed';
      font-weight: 800;
      font-size: 34px;
      line-height: 1.02;
      margin-top: 14px;
      letter-spacing: 0.4px;
      text-wrap: balance;
    }
    .hero p {
      font-size: 14.5px;
      line-height: 1.45;
      color: rgba(255,255,255,0.72);
      margin-top: 12px;
      max-width: 290px;
    }

    .search-wrap { padding: 0 22px; margin-top: -20px; position: relative; z-index: 10; }
    .search {
      display: flex; align-items: center; gap: 11px;
      background: #fff;
      border-radius: 15px;
      padding: 14px 16px;
      box-shadow: 0 14px 30px rgba(10,37,64,0.16);
    }
    .search input {
      flex: 1; border: none; outline: none;
      font-size: 15px; font-family: 'Barlow';
      color: var(--ink); background: transparent;
    }
    .search input::placeholder { color: #9aa9bb; }

    .chips {
      display: flex; gap: 9px;
      padding: 22px 22px 4px;
      overflow-x: auto;
    }
    .chips::-webkit-scrollbar { height: 0; }
    .chip {
      flex-shrink: 0;
      font-family: 'Barlow Semi Condensed';
      font-size: 13.5px; font-weight: 600;
      letter-spacing: 0.4px;
      padding: 9px 16px;
      border-radius: 11px;
      background: #fff;
      border: 1px solid var(--line);
      color: var(--ink-soft);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.16s;
    }
    .chip.active {
      background: var(--navy);
      border-color: var(--navy);
      color: #fff;
    }

    .section-head {
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 22px 22px 14px;
    }
    .section-head h2 {
      font-family: 'Barlow Semi Condensed';
      font-weight: 700; font-size: 20px;
      color: var(--ink); letter-spacing: 0.3px;
    }
    .section-head span {
      font-size: 13px; font-weight: 600; color: var(--gold-deep);
    }

    .product-list {
      display: flex; flex-direction: column; gap: 14px;
      padding: 0 22px 30px;
    }
    .pcard {
      display: flex; gap: 14px;
      background: #fff;
      border-radius: 18px;
      padding: 14px;
      border: 1px solid var(--line);
      cursor: pointer;
      transition: transform 0.16s, box-shadow 0.16s;
      box-shadow: 0 2px 8px rgba(10,37,64,0.04);
    }
    .pcard:active {
      transform: scale(0.985);
      box-shadow: 0 10px 24px rgba(10,37,64,0.12);
    }
    .pcard-img {
      width: 92px; height: 100px;
      border-radius: 13px;
      flex-shrink: 0;
      position: relative;
      display: flex; align-items: flex-end;
      padding: 9px;
      overflow: hidden;
    }
    .pcard-img .flow {
      font-family: 'Barlow Semi Condensed';
      font-weight: 800;
      color: #fff;
      line-height: 0.92;
    }
    .pcard-img .flow b { display: block; font-size: 22px; }
    .pcard-img .flow small { font-size: 10px; font-weight: 600; opacity: 0.85; letter-spacing: 0.5px; }
    .pcard-img::before {
      content: "";
      position: absolute; inset: 0;
      background-image:
        repeating-linear-gradient(135deg, rgba(255,255,255,0.07) 0 2px, transparent 2px 9px);
      z-index: 1;
    }
    .pcard-photo {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    .img-scrim {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(6,25,44,0.05) 35%, rgba(6,25,44,0.78) 100%);
      z-index: 2;
    }
    .pcard-img .flow { position: relative; z-index: 3; text-shadow: 0 1px 4px rgba(0,0,0,0.4); }

    /* News rail (home) */
    .novita { padding: 4px 0 8px; }
    .news-rail {
      display: flex; gap: 15px;
      padding: 4px 22px 8px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-padding-left: 22px;
    }
    .news-rail::-webkit-scrollbar { height: 0; }
    .news-mini {
      flex-shrink: 0; width: 252px;
      scroll-snap-align: start;
      background: #fff; border-radius: 18px;
      border: 1px solid var(--line); overflow: hidden;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(10,37,64,0.06);
      transition: transform 0.22s cubic-bezier(.2,.7,.3,1), box-shadow 0.22s;
    }
    .news-mini:active { transform: scale(0.97); }
    .news-mini-imgwrap { position: relative; height: 140px; overflow: hidden; }
    .news-mini-img {
      width: 100%; height: 100%; object-fit: cover;
      background: var(--navy-soft); display: block;
      transition: transform 0.5s cubic-bezier(.2,.7,.3,1);
    }
    .news-mini:hover .news-mini-img { transform: scale(1.07); }
    .news-mini-cat {
      position: absolute; top: 11px; left: 11px;
      font-family: 'Barlow Semi Condensed';
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.8px;
      text-transform: uppercase; color: var(--navy-deep);
      background: var(--gold); padding: 4px 9px; border-radius: 7px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.18);
    }
    .news-mini-body { padding: 13px 14px 16px; }
    .news-cat {
      font-family: 'Barlow Semi Condensed';
      font-size: 10.5px; font-weight: 600; letter-spacing: 0.8px;
      text-transform: uppercase; color: var(--gold-deep);
    }
    .news-mini-t {
      font-family: 'Barlow Semi Condensed';
      font-size: 16.5px; font-weight: 700; color: var(--ink);
      line-height: 1.18; margin-top: 2px;
      text-wrap: pretty;
    }
    .news-date {
      font-size: 12px; color: #9aa9bb; margin-top: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .news-date .read {
      margin-left: auto; color: var(--gold-deep); font-weight: 700;
      font-family: 'Barlow Semi Condensed'; font-size: 12.5px;
      display: flex; align-items: center; gap: 2px;
    }
    .news-date .read svg { width: 14px; height: 14px; }

    /* News screen */
    .news-list { padding: 16px 22px 30px; display: flex; flex-direction: column; gap: 16px; }
    /* featured */
    .news-feat {
      border-radius: 20px; overflow: hidden; cursor: pointer;
      position: relative; color: #fff;
      box-shadow: 0 12px 30px rgba(10,37,64,0.18);
    }
    .news-feat:active { transform: scale(0.985); }
    .news-feat-img { width: 100%; height: 220px; object-fit: cover; display: block; background: var(--navy-soft); }
    .news-feat-scrim {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(6,25,44,0) 30%, rgba(6,25,44,0.92) 100%);
    }
    .news-feat-body { position: absolute; left: 0; right: 0; bottom: 0; padding: 18px; }
    .news-feat-cat {
      display: inline-block;
      font-family: 'Barlow Semi Condensed';
      font-size: 10.5px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      color: var(--navy-deep); background: var(--gold);
      padding: 4px 10px; border-radius: 7px; margin-bottom: 9px;
    }
    .news-feat-t {
      font-family: 'Barlow Semi Condensed';
      font-size: 23px; font-weight: 800; line-height: 1.08; letter-spacing: 0.2px;
      text-wrap: balance; text-shadow: 0 1px 8px rgba(0,0,0,0.35);
    }
    .news-feat-meta { font-size: 12.5px; color: rgba(255,255,255,0.78); margin-top: 9px; }

    .news-row {
      display: flex; gap: 14px; align-items: stretch;
      background: #fff; border-radius: 16px; padding: 12px;
      border: 1px solid var(--line); cursor: pointer;
      box-shadow: 0 3px 12px rgba(10,37,64,0.05);
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .news-row:active { transform: scale(0.98); }
    .news-row-img {
      width: 92px; height: 92px; border-radius: 12px;
      object-fit: cover; flex-shrink: 0; background: var(--navy-soft);
    }
    .news-row-body { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .news-row-t {
      font-family: 'Barlow Semi Condensed';
      font-size: 17px; font-weight: 700; color: var(--ink); line-height: 1.2;
      margin-top: 2px; text-wrap: pretty;
    }
    .news-row .news-date { margin-top: auto; padding-top: 8px; }

    /* ===== entrance animations ===== */
    @media (prefers-reduced-motion: no-preference) {
      @keyframes riseIn {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes slideIn {
        from { opacity: 0; transform: translateX(26px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      .screen.active .anim-rise { animation: riseIn 0.5s cubic-bezier(.2,.7,.3,1) both; }
      .screen.active .anim-slide { animation: slideIn 0.5s cubic-bezier(.2,.7,.3,1) both; }
    }
    .pcard-body { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .pcat {
      font-family: 'Barlow Semi Condensed';
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.8px; text-transform: uppercase;
      color: var(--gold-deep);
    }
    .pname {
      font-family: 'Barlow Semi Condensed';
      font-weight: 700; font-size: 18px;
      color: var(--ink); letter-spacing: 0.2px;
      margin-top: 3px; line-height: 1.05;
    }
    .pdesc { font-size: 13px; color: var(--ink-soft); margin-top: 4px; line-height: 1.35; }
    .pmeta { display: flex; gap: 7px; margin-top: auto; padding-top: 10px; }
    .tag {
      font-family: 'Barlow Semi Condensed';
      font-size: 11px; font-weight: 600; letter-spacing: 0.4px;
      padding: 4px 9px; border-radius: 7px;
      background: var(--mist); color: var(--ink-soft);
      display: inline-flex; align-items: center; gap: 4px;
    }
    .tag.ce { background: rgba(31,138,76,0.1); color: var(--ce-green); }

    /* ============ PRODUCT DETAIL ============ */
    .detail-hero {
      position: relative;
      padding: 0 22px 30px;
      color: #fff;
      overflow: hidden;
    }
    .detail-hero::before {
      content: "";
      position: absolute; inset: 0;
      background-image:
        repeating-linear-gradient(135deg, rgba(255,255,255,0.06) 0 2px, transparent 2px 12px);
      opacity: 0.6;
    }
    .detail-nav {
      display: flex; align-items: center; justify-content: space-between;
      position: relative; z-index: 2;
    }
    .detail-hero-content { position: relative; z-index: 2; margin-top: 28px; }
    .detail-cat {
      display: inline-block;
      font-family: 'Barlow Semi Condensed';
      font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gold);
      background: rgba(245,179,1,0.12);
      border: 1px solid rgba(245,179,1,0.28);
      padding: 5px 12px; border-radius: 20px;
    }
    .detail-name {
      font-family: 'Barlow Semi Condensed';
      font-weight: 800; font-size: 32px;
      letter-spacing: 0.5px; line-height: 1.0;
      margin-top: 16px;
    }
    .detail-flow {
      display: flex; align-items: baseline; gap: 8px;
      margin-top: 16px;
    }
    .detail-flow b {
      font-family: 'Barlow Semi Condensed';
      font-size: 40px; font-weight: 800; color: var(--gold);
      line-height: 1;
    }
    .detail-flow span { font-size: 14px; color: rgba(255,255,255,0.7); font-weight: 500; }

    .detail-body { padding: 24px 22px 30px; }
    .spec-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      margin-top: -56px; position: relative; z-index: 5;
    }
    .spec-card {
      background: #fff; border-radius: 15px; padding: 15px;
      border: 1px solid var(--line);
      box-shadow: 0 6px 16px rgba(10,37,64,0.07);
    }
    .spec-card .ico {
      width: 34px; height: 34px; border-radius: 10px;
      background: var(--mist); color: var(--navy);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 10px;
    }
    .spec-card .lbl {
      font-family: 'Barlow Semi Condensed';
      font-size: 11px; font-weight: 600; letter-spacing: 0.6px;
      text-transform: uppercase; color: var(--ink-soft);
    }
    .spec-card .val {
      font-family: 'Barlow Semi Condensed';
      font-size: 19px; font-weight: 700; color: var(--ink);
      margin-top: 2px; line-height: 1.1;
    }

    .block-title {
      font-family: 'Barlow Semi Condensed';
      font-weight: 700; font-size: 18px; color: var(--ink);
      margin: 26px 0 11px; letter-spacing: 0.3px;
    }
    .detail-desc { font-size: 14.5px; line-height: 1.6; color: var(--ink-soft); }

    .sectors { display: flex; flex-wrap: wrap; gap: 8px; }
    .sector {
      font-family: 'Barlow Semi Condensed';
      font-size: 13px; font-weight: 600; letter-spacing: 0.3px;
      padding: 8px 13px; border-radius: 10px;
      background: #fff; border: 1px solid var(--line); color: var(--ink);
    }

    .detail-cta {
      position: sticky; bottom: 0;
      display: flex; gap: 11px;
      padding: 14px 22px calc(14px + env(safe-area-inset-bottom));
      background: linear-gradient(to top, var(--mist) 70%, transparent);
    }
    .btn {
      font-family: 'Barlow Semi Condensed';
      font-weight: 700; font-size: 16px; letter-spacing: 0.4px;
      border: none; border-radius: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: transform 0.14s, filter 0.14s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      flex: 1; padding: 16px;
      background: var(--gold); color: var(--navy-deep);
      box-shadow: 0 10px 22px rgba(245,179,1,0.32);
    }
    .btn-icon {
      width: 54px; flex-shrink: 0;
      background: var(--navy); color: #fff;
    }

    /* ============ MENU ============ */
    .menu-top {
      background: linear-gradient(160deg, var(--navy) 0%, var(--navy-deep) 100%);
      padding: 8px 22px 26px;
      color: #fff;
    }
    .menu-top h2 {
      font-family: 'Barlow Semi Condensed';
      font-weight: 800; font-size: 30px; letter-spacing: 0.5px;
      margin-top: 12px;
    }
    .menu-top p { font-size: 13.5px; color: rgba(255,255,255,0.62); margin-top: 4px; }
    .menu-list { padding: 14px 22px 20px; display: flex; flex-direction: column; }
    .menu-item {
      display: flex; align-items: center; gap: 15px;
      padding: 17px 0;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
    }
    .menu-item:active { opacity: 0.55; }
    .menu-ico {
      width: 42px; height: 42px; border-radius: 12px;
      background: var(--mist); color: var(--navy);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .menu-txt { flex: 1; }
    .menu-txt b {
      font-family: 'Barlow Semi Condensed';
      font-size: 17px; font-weight: 700; color: var(--ink);
      letter-spacing: 0.2px; display: block;
    }
    .menu-txt small { font-size: 12.5px; color: var(--ink-soft); }
    .menu-chev { color: #b9c5d2; }

    .contact-card {
      margin: 6px 22px 30px;
      background: var(--navy);
      border-radius: 18px;
      padding: 20px;
      color: #fff;
      position: relative;

    /* ---------- Scheda tecnica PDF (generata al volo, funziona offline) ---------- */
    function dlFile(name, blob) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = name;
      document.body.appendChild(a); a.click();
      setTimeout(function () { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1500);
    }
    function pdfAscii(s) { return String(s).normalize('NFKD').replace(/[\u0300-\u036f]/g, '').replace(/\u00b5/g, 'u').replace(/[^\x20-\x7e]/g, '-'); }
    function pdfEsc(s) { return pdfAscii(s).replace(/([\\()])/g, '\\$1'); }
    function pdfWrap(s, n) {
      const words = String(s).split(/\s+/); const out = []; let line = '';
      words.forEach(function (w) { if ((line + ' ' + w).trim().length > n) { out.push(line.trim()); line = w; } else { line += ' ' + w; } });
      if (line.trim()) out.push(line.trim()); return out;
    }
    function makePDF(cs) {
      const objs = [];
      objs[1] = '<</Type/Catalog/Pages 2 0 R>>';
      objs[2] = '<</Type/Pages/Kids[3 0 R]/Count 1>>';
      objs[3] = '<</Type/Page/Parent 2 0 R/MediaBox[0 0 595 842]/Resources<</Font<</F1 5 0 R/F2 6 0 R>>>>/Contents 4 0 R>>';
      objs[4] = '<</Length ' + cs.length + '>>\nstream\n' + cs + 'endstream';
      objs[5] = '<</Type/Font/Subtype/Type1/BaseFont/Helvetica-Bold>>';
      objs[6] = '<</Type/Font/Subtype/Type1/BaseFont/Helvetica>>';
      let pdf = '%PDF-1.4\n'; const off = [];
      for (let i = 1; i < objs.length; i++) { off[i] = pdf.length; pdf += i + ' 0 obj\n' + objs[i] + '\nendobj\n'; }
      const xs = pdf.length;
      pdf += 'xref\n0 ' + objs.length + '\n0000000000 65535 f \n';
      for (let j = 1; j < objs.length; j++) { pdf += ('0000000000' + off[j]).slice(-10) + ' 00000 n \n'; }
      pdf += 'trailer\n<</Size ' + objs.length + '/Root 1 0 R>>\nstartxref\n' + xs + '\n%%EOF';
      return new Blob([pdf], { type: 'application/pdf' });
    }
    function schedaPDF(p) {
      const navy = '0.039 0.145 0.251', gold = '0.957 0.702 0.004', gray = '0.32 0.39 0.48', white = '1 1 1';
      let cs = '';
      const fill = c => { cs += c + ' rg\n'; };
      const rect = (x, y, w, h) => { cs += x + ' ' + y + ' ' + w + ' ' + h + ' re f\n'; };
      const T = (x, y, size, font, c, str) => { cs += 'BT ' + c + ' rg /' + font + ' ' + size + ' Tf ' + x + ' ' + y + ' Td (' + pdfEsc(str) + ') Tj ET\n'; };
      fill(navy); rect(0, 762, 595, 80);
      T(40, 802, 22, 'F1', white, 'GFT FILTRAZIONE');
      T(40, 782, 10, 'F2', gold, 'SCHEDA TECNICA PRODOTTO');
      T(40, 712, 24, 'F1', navy, p.name);
      T(40, 690, 12, 'F2', gray, p.category);
      fill(gold); rect(40, 678, 515, 2);
      let y = 646;
      [['Portata', p.flowFull], ['Filtrazione', p.micron], ['Trattamento', p.water], ['Tipologia', p.type], ['Certificazione', 'CE - Conforme']].forEach(function (r) {
        T(40, y, 10, 'F2', gray, r[0].toUpperCase());
        T(210, y, 13, 'F1', navy, r[1]); y -= 30;
      });
      y -= 8;
      T(40, y, 12, 'F1', navy, 'DESCRIZIONE'); y -= 22;
      pdfWrap(p.desc + ' Progettato per garantire la massima purezza dei fluidi e prolungare la vita di pompe, valvole e componenti idraulici. Costruzione robusta per uso industriale continuo.', 82).forEach(function (l) { T(40, y, 11, 'F2', gray, l); y -= 16; });
      y -= 14;
      T(40, y, 12, 'F1', navy, 'SETTORI DI APPLICAZIONE'); y -= 22;
      T(40, y, 11, 'F2', gray, p.sectors.join('   -   '));
      fill(navy); rect(0, 0, 595, 70);
      T(40, 42, 11, 'F1', white, 'GFT Srl  -  Via Celestino Monari Sarde, 9  -  40010 Bentivoglio (BO)');
      T(40, 25, 10, 'F2', gold, 'Tel. 349 5965967    info@gft-filtrazione.it    www.gft-filtrazione.it');
      return makePDF(cs);
    }
    function schedaDownload(p) {
      dlFile('Scheda-Tecnica-' + p.name.replace(/\s+/g, '-') + '.pdf', schedaPDF(p));
    }

                  </div>

                  <div className="block-title">Documentazione</div>
                  <button className="doc-card" onClick={() => schedaDownload(product)}>
                    <div className="doc-ico">{Ic.pdf}</div>
                    <div className="doc-info">
                      <b>Scheda tecnica — {product.name}</b>
                      <small>PDF · Specifiche complete</small>
                    </div>
                    <div className="doc-dl">{Ic.download}</div>
                  </button>
                </div>
              </div>

              <div className="detail-cta">
                <button className="btn btn-primary" onClick={() => setScreen('contatti')}>{Ic.mail} Richiedi informazioni</button>
                <button className="btn btn-icon">{Ic.phone}</button>
              </div>
            </div>

            {/* CATEGORY */}
            <div className={`screen ${screen === 'category' ? 'active' : ''}`}>
              <div className="scroll-area">
                {(() => {
                  const meta = catMeta[activeCat] || { title: activeCat, desc: '', match: () => true };
                  const list = products.filter(meta.match);
                  return (
                    <React.Fragment>
                      <div className="cat-hero">
                        <StatusBar dark />
                        <div className="cat-nav">
                          <div className="icon-btn" onClick={() => setScreen('home')}>{Ic.back}</div>
                          <div className="icon-btn" onClick={() => setScreen('menu')}>{Ic.menu}</div>
                        </div>
                        <span className="cat-eyebrow">Categoria prodotti</span>
                        <h2>{meta.title}</h2>
                        <p>{meta.desc}</p>
                      </div>

                      <div className="cat-toolbar">
                        <div className="cat-count"><span>{list.length}</span> {list.length === 1 ? 'sistema' : 'sistemi'}</div>
                        <div className="cat-sort">{Ic.filter} Ordina</div>
                      </div>

                      {list.length > 0 ? (
                        <div className="product-list">
                          {list.map((p, idx) => (
                            <div key={p.id} className="pcard anim-rise" style={{ animationDelay: `${0.05 * idx}s` }} onClick={() => openProduct(p.id, 'category')}>
                              <div className="pcard-img" style={{ background: p.grad }}>
                                <img className="pcard-photo" src={p.photo} alt={p.name} loading="lazy" onError={e => { e.target.style.display = 'none'; }} />
                                <div className="img-scrim"></div>
                                <div className="flow"><b>{p.flow}</b><small>L/MIN</small></div>
                              </div>
                              <div className="pcard-body">
                                <div className="pcat">{p.category}</div>
                                <div className="pname">{p.name}</div>
                                <div className="pdesc">{p.desc}</div>
                                <div className="pmeta">
                                  <span className="tag">{p.micron}</span>
                                  <span className="tag ce">{Ic.shield} CE</span>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      ) : (
                        <div className="empty-state">
                          <div className="es-ico">{Ic.layers}</div>
                          <h4>Catalogo in aggiornamento</h4>
                          <p>Le soluzioni per questa categoria saranno presto disponibili. Contattaci per una consulenza dedicata.</p>
                          <button onClick={() => openProduct(1, 'category')}>Vedi i prodotti correlati</button>
                        </div>
                      )}
                      <div style={{ height: '24px' }}></div>
                    </React.Fragment>
                  );
                })()}
              </div>
            </div>

            {/* MENU */}
            <div className={`screen ${screen === 'menu' ? 'active' : ''}`}>
              <div className="scroll-area">
                <div className="menu-top">
                  <StatusBar dark />
                  <h2>Menu</h2>
                  <p>Naviga prodotti, servizi e contatti</p>
                </div>
                <div className="menu-list">
                  {[
                    { ico: Ic.building, t: 'Chi siamo', s: 'Azienda, press, distributori' },
                    { ico: Ic.grid, t: 'Prodotti', s: 'Olio · Gasolio · AdBlue · CNC' },
                    { ico: Ic.wrench, t: 'Servizi', s: 'Riparazione pompe e motori idraulici' },
                    { ico: Ic.factory, t: 'Settori', s: 'Applicazioni industriali' },
                    { ico: Ic.news, t: 'News', s: 'Olio · Gasolio · CNC' },
                    { ico: Ic.info, t: 'FAQ', s: 'Domande su olio e gasolio' },
                  ].map((m, i) => (
                    <div key={i} className="menu-item" onClick={() => {
                      if (m.t === 'Prodotti') setScreen('home');
                      if (m.t === 'News') setScreen('news');
                    }}>
                      <div className="menu-ico">{m.ico}</div>
                      <div className="menu-txt"><b>{m.t}</b><small>{m.s}</small></div>
                      <span className="menu-chev">{Ic.chev}</span>
                    </div>
                  ))}
                </div>
                <div className="contact-card" style={{cursor:'pointer'}} onClick={() => setScreen('contatti')}>
                  <div className="ct-lbl">Contattaci</div>
                  <div className="ct-phone">349 5965967</div>
                  <div className="ct-addr">GFT Srl — Via Celestino Monari Sardé, 9<br/>40010 Bentivoglio (BO)</div>
                </div>
              </div>
            </div>

            {/* CONTATTI */}
            <div className={`screen ${screen === 'contatti' ? 'active' : ''}`}>
              <ContactScreen products={products} goBack={() => setScreen('home')} />
            </div>

            {/* NEWS */}
            <div className={`screen ${screen === 'news' ? 'active' : ''}`}>
              <div className="scroll-area">
                <div className="menu-top">
                  <StatusBar dark />
                  <h2>News</h2>
                  <p>Approfondimenti su olio, gasolio e CNC</p>
                </div>
                <div className="news-list">
                  {newsItems.map((n, i) => (
                    i === 0 ? (
                    <div key={i} className="news-feat anim-rise" onClick={() => {}}>
                      <img className="news-feat-img" src={n.photo} alt={n.t} loading="lazy"
                        onError={e => { e.target.style.height='160px'; }} />
                      <div className="news-feat-scrim"></div>
                      <div className="news-feat-body">
                        <span className="news-feat-cat">{n.cat}</span>
                        <div className="news-feat-t">{n.t}</div>
                        <div className="news-feat-meta">{n.date} · Approfondimento</div>
                      </div>
                    </div>
                    ) : (
                    <div key={i} className="news-row anim-rise" style={{ animationDelay: `${0.05 * i}s` }}>
                      <img className="news-row-img" src={n.photo} alt={n.t} loading="lazy"
                        onError={e => { e.target.style.visibility='hidden'; }} />
                      <div className="news-row-body">
                        <div className="news-cat">{n.cat}</div>
                        <div className="news-row-t">{n.t}</div>
                        <div className="news-date">{n.date}<span className="read">Leggi {Ic.chev}</span></div>
                      </div>
                    </div>
                    )
                  ))}
                </div>
              </div>
            </div>

            {/* TAB BAR */}
            <div className="tabbar">
              <button className={`tab ${screen === 'home' ? 'active' : ''}`} onClick={() => setScreen('home')}>
                {Ic.home}<span className="lbl">Home</span>
              </button>
              <button className={`tab ${screen === 'product' ? 'active' : ''}`} onClick={() => setScreen('product')}>
                {Ic.grid}<span className="lbl">Prodotti</span>
              </button>
              <button className={`tab ${screen === 'news' ? 'active' : ''}`} onClick={() => setScreen('news')}>
                {Ic.news}<span className="lbl">News</span>
              </button>
              <button className={`tab ${screen === 'contatti' ? 'active' : ''}`} onClick={() => setScreen('contatti')}>
                {Ic.mail}<span className="lbl">Contatti</span>
              </button>
              <button className={`tab ${screen === 'menu' ? 'active' : ''}`} onClick={() => setScreen('menu')}>
                {Ic.bars}<span className="lbl">Menu</span>
              </button>
            </div>

            <div className="home-indicator"></div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<GFT />, document.getElementById('root'));
  </script>
</body>
</html>
